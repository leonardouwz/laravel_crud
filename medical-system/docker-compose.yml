version: '3.8'

services:
  app:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: medical_app
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=medical_db
      - DB_USERNAME=medical_user
      - DB_PASSWORD=secret

  db:
    image: mysql:8.0
    container_name: medical_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: medical_db
      MYSQL_USER: medical_user
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: medical_phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: medical_user
      PMA_PASSWORD: secret
    depends_on:
      - db

volumes:
  mysql_data: